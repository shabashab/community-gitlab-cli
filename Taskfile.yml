# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  build:
    desc: Build the project binaries
    cmds:
      - go build -o bin/gl ./cmd/gl
      - go build -o bin/gl-axi ./cmd/gl-axi
      - chmod +x bin/gl bin/gl-axi
  install:
    desc: Install gl and gl-axi into GOBIN (defaults to ~/go/bin)
    cmds:
      - go install ./cmd/gl ./cmd/gl-axi
  test:
    desc: Run Go tests
    cmds:
      - go test ./...
  e2e:
    desc: Run live E2E tests (needs GL_E2E_HOST, GL_E2E_TOKEN, GL_E2E_GROUP; .test.env is loaded when present)
    dotenv: ['.test.env']
    cmds:
      - go test -tags e2e -count=1 -parallel 4 -timeout 20m ./e2e {{.CLI_ARGS}}
  e2e:clean:
    desc: Delete leaked gl-e2e-* projects older than 1h from the E2E group
    dotenv: ['.test.env']
    cmds:
      - go run ./e2e/janitor {{.CLI_ARGS}}
  run:
    desc: Run the gl binary
    cmds:
      - bin/gl {{.CLI_ARGS}}
    deps:
      - build
  run-axi:
    desc: Run the gl-axi binary
    cmds:
      - bin/gl-axi {{.CLI_ARGS}}
    deps:
      - build
  client-go-source:
    desc: Print the local module-cache metadata for the GitLab client-go source
    cmds:
      - go mod download gitlab.com/gitlab-org/api/client-go/v2
      - go list -m -json gitlab.com/gitlab-org/api/client-go/v2
